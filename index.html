<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flappy Clawb 2P</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        body { 
            background: #0c4a6e; 
            font-family: 'Press Start 2P', system-ui; 
            margin: 0; 
            padding: 0; 
            overflow: hidden; 
            color: white;
        }
        canvas { 
            image-rendering: pixelated; 
            border: 8px solid #164e63; 
            box-shadow: 0 25px 50px -12px rgb(0 0 0); 
            display: block;
        }
        .overlay { 
            position: absolute; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -50%); 
            background: rgba(15, 23, 42, 0.95);
            padding: 30px;
            border: 6px solid #22d3ee;
            border-radius: 16px;
            text-align: center;
            min-width: 400px;
        }
    </style>
</head>
<body>
    <div class="flex items-center justify-center min-h-screen">
        <div class="relative">
            <canvas id="canvas" width="520" height="580"></canvas>
            
            <!-- Lobby -->
            <div id="lobby" class="overlay">
                <div class="text-6xl mb-3">🐢</div>
                <div class="text-4xl font-bold text-yellow-300 mb-8">FLAPPY CLAWB 2P</div>
                
                <div class="mb-8">
                    <div class="text-sky-200 text-sm mb-2">YOUR NAME</div>
                    <input id="name-input" type="text" maxlength="9" value="Clawb" 
                           class="bg-slate-900 border-4 border-sky-400 text-center text-3xl p-4 w-64 rounded-2xl text-white">
                </div>
                
                <button onclick="saveName()" class="block w-full mb-6 bg-sky-500 hover:bg-sky-400 px-8 py-4 text-xl font-bold rounded-2xl border-4 border-white">
                    SAVE NAME
                </button>
                
                <button onclick="joinGame()" id="join-btn" 
                        class="block w-full bg-emerald-500 hover:bg-emerald-400 px-8 py-6 text-3xl font-bold rounded-3xl border-4 border-white">
                    JOIN GAME
                </button>
                
                <div id="status" class="mt-10 text-sky-200 text-sm">Connecting to server...</div>
                <div id="ping" class="text-xs text-sky-300 mt-2"></div>
            </div>

            <!-- Game Over -->
            <div id="game-over-screen" class="overlay hidden">
                <div id="final-result" class="text-4xl mb-8 text-red-400"></div>
                <button onclick="location.reload()" 
                        class="bg-white text-slate-900 px-12 py-5 text-2xl font-bold rounded-2xl border-4 border-slate-900">
                    PLAY AGAIN
                </button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        let ws = null;
        let myId = null;
        let myName = "Clawb";
        let gameState = null;
        let lastPing = 0;
        let pingMs = 0;
        let connected = false;
        let joined = false;

        const statusEl = document.getElementById('status');
        const pingEl = document.getElementById('ping');
        const joinBtn = document.getElementById('join-btn');

        function updateStatus(text, error = false) {
            statusEl.textContent = text;
            statusEl.style.color = error ? '#fda4af' : '#bae6fd';
        }

        function connect() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            ws = new WebSocket(protocol + '//' + window.location.host);
            
            ws.onopen = () => {
                connected = true;
                updateStatus('Connected');
                lastPing = performance.now();
                ws.send(JSON.stringify({type: 'ping'}));
            };
            
            ws.onmessage = (e) => {
                const msg = JSON.parse(e.data);
                
                if (msg.type === 'connected') myId = msg.playerId;
                if (msg.type === 'pong') {
                    pingMs = Math.round(performance.now() - lastPing);
                    pingEl.textContent = `PING: ${pingMs}ms`;
                    setTimeout(() => {
                        if (ws && ws.readyState === 1) {
                            lastPing = performance.now();
                            ws.send(JSON.stringify({type: 'ping'}));
                        }
                    }, 1000);
                }
                if ((msg.type === 'start' || msg.type === 'state') && !joined) {
                    joined = true;
                    document.getElementById('lobby').style.display = 'none';
                    gameState = msg.state;
                }
                if (msg.type === 'gameOver') {
                    gameState = msg.finalState || msg.state;
                    const result = document.getElementById('final-result');
                    let html = 'GAME OVER<br><span class="text-xl text-white">';
                    Object.values(gameState.players || {}).forEach(p => {
                        html += p.name + ': ' + (p.score || 0) + '<br>';
                    });
                    html += '</span>';
                    result.innerHTML = html;
                    document.getElementById('game-over-screen').classList.remove('hidden');
                }
            };
            
            ws.onerror = () => updateStatus('Connection error', true);
            ws.onclose = () => updateStatus('Disconnected - refresh page', true);
        }

        window.saveName = function() {
            myName = document.getElementById('name-input').value.trim() || 'Clawb';
            if (ws && ws.readyState === 1 && myId) {
                ws.send(JSON.stringify({type:'name', id: myId, name: myName}));
            }
        };

        window.joinGame = function() {
            if (!connected || joined) return;
            joinBtn.textContent = 'WAITING...';
            joinBtn.disabled = true;
            updateStatus('Waiting for second player...');
            if (ws && ws.readyState === 1 && myId) {
                ws.send(JSON.stringify({type:'name', id: myId, name: myName}));
            }
        };

        function flap() {
            if (ws && ws.readyState === 1 && myId && gameState?.players?.[myId]?.alive) {
                ws.send(JSON.stringify({type:'flap', playerId: myId}));
            }
        }

        function draw() {
            ctx.fillStyle = '#0ea5e9';
            ctx.fillRect(0, 0, 520, 580);
            ctx.fillStyle = '#166534';
            ctx.fillRect(0, 500, 520, 80);
            
            if (gameState && gameState.pipes) {
                ctx.fillStyle = '#166534';
                gameState.pipes.forEach(p => {
                    ctx.fillRect(p.x, 0, 65, p.topHeight || 200);
                    ctx.fillRect(p.x, (p.topHeight || 200) + 170, 65, 580);
                });
            }
            
            if (gameState && gameState.players) {
                Object.values(gameState.players).forEach(p => {
                    if (!p.alive) return;
                    ctx.save();
                    ctx.translate(p.x || 160, p.y || 250);
                    ctx.rotate(p.rotation || 0);
                    ctx.fillStyle = p.color || '#10b981';
                    ctx.beginPath();
                    ctx.ellipse(0, 0, 19, 17, 0, 0, Math.PI*2);
                    ctx.fill();
                    ctx.restore();
                    
                    ctx.fillStyle = 'white';
                    ctx.font = 'bold 18px "Press Start 2P"';
                    ctx.textAlign = 'center';
                    ctx.fillText(p.name || '???', p.x || 160, (p.y || 250) - 45);
                    ctx.fillText((p.score || 0).toString(), p.x || 160, (p.y || 250) - 68);
                });
            }
            
            requestAnimationFrame(draw);
        }

        document.addEventListener('keydown', e => {
            if ([' ', 'Enter', 'w', 'W', 'ArrowUp'].includes(e.key)) flap();
        });
        canvas.addEventListener('click', flap);
        canvas.addEventListener('touchstart', e => { e.preventDefault(); flap(); });

        window.onload = () => {
            connect();
            draw();
        };
    </script>
</body>
</html>
